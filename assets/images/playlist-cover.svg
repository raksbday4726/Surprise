<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="45%" stop-color="#1A1035"/>
      <stop offset="100%" stop-color="#0A0818"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="35%" stop-color="#F5E6B8"/>
      <stop offset="70%" stop-color="#D4B870"/>
      <stop offset="100%" stop-color="#8B6A20"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE08A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFE08A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A0BF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8A0BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Deep purple nebula -->
  <ellipse cx="80" cy="300" rx="160" ry="120" fill="#7C5CBF" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="320" cy="100" rx="130" ry="100" fill="#B39DDB" opacity="0.07" filter="url(#blur1)"/>
  <ellipse cx="200" cy="380" rx="200" ry="80" fill="#E8A0BF" opacity="0.07" filter="url(#blur1)"/>

  <!-- Moon glow halo -->
  <circle cx="300" cy="95" r="85" fill="url(#moonGlow)" filter="url(#blur1)"/>

  <!-- Moon -->
  <circle cx="300" cy="95" r="48" fill="url(#moon)"/>
  <!-- Moon shadow -->
  <ellipse cx="318" cy="95" rx="28" ry="38" fill="rgba(0,0,0,0.18)" filter="url(#blur2)"/>
  <!-- Moon craters -->
  <circle cx="285" cy="82" r="6" fill="rgba(0,0,0,0.09)"/>
  <circle cx="308" cy="108" r="4" fill="rgba(0,0,0,0.07)"/>
  <circle cx="295" cy="100" r="3" fill="rgba(0,0,0,0.06)"/>

  <!-- Stars -->
  <g filter="url(#starGlow)" fill="white">
    <circle cx="42" cy="28" r="1.4" opacity="0.85"/>
    <circle cx="120" cy="18" r="0.9" opacity="0.6"/>
    <circle cx="175" cy="42" r="1.1" opacity="0.7"/>
    <circle cx="220" cy="22" r="0.8" opacity="0.55"/>
    <circle cx="58" cy="75" r="0.7" opacity="0.5"/>
    <circle cx="148" cy="65" r="1.2" opacity="0.75"/>
    <circle cx="22" cy="130" r="0.9" opacity="0.6"/>
    <circle cx="95" cy="155" r="1.0" opacity="0.65"/>
    <circle cx="200" cy="130" r="0.7" opacity="0.5"/>
    <circle cx="38" cy="200" r="1.3" opacity="0.7"/>
    <circle cx="155" cy="190" r="0.8" opacity="0.55"/>
    <circle cx="72" cy="250" r="0.9" opacity="0.6"/>
    <circle cx="18" cy="305" r="1.1" opacity="0.65"/>
    <circle cx="110" cy="330" r="0.7" opacity="0.5"/>
    <circle cx="60" cy="380" r="1.0" opacity="0.6"/>
    <circle cx="250" cy="60" r="1.1" opacity="0.7"/>
    <circle cx="348" cy="165" r="0.8" opacity="0.55"/>
    <circle cx="375" cy="240" r="1.2" opacity="0.68"/>
    <circle cx="360" cy="340" r="0.9" opacity="0.58"/>
    <circle cx="310" cy="290" r="0.7" opacity="0.5"/>
    <circle cx="185" cy="310" r="1.0" opacity="0.62"/>
  </g>
  <!-- Pink tinted stars -->
  <g fill="#E8A0BF">
    <circle cx="240" cy="170" r="1.1" opacity="0.55"/>
    <circle cx="135" cy="240" r="0.9" opacity="0.5"/>
    <circle cx="330" cy="220" r="1.0" opacity="0.52"/>
  </g>
  <!-- Lavender stars -->
  <g fill="#B39DDB">
    <circle cx="90" cy="108" r="1.0" opacity="0.55"/>
    <circle cx="268" cy="200" r="0.9" opacity="0.5"/>
    <circle cx="190" cy="280" r="1.1" opacity="0.52"/>
  </g>

  <!-- Pink glow at bottom left -->
  <circle cx="60" cy="370" r="120" fill="url(#pinkGlow)" filter="url(#blur1)"/>

  <!-- Floating hearts -->
  <text x="32" y="178" font-size="11" opacity="0.25" fill="#E8A0BF">💜</text>
  <text x="340" y="290" font-size="9" opacity="0.2" fill="#B39DDB">✨</text>
  <text x="165" y="355" font-size="8" opacity="0.18" fill="#E8A0BF">🌸</text>

  <!-- Soft wave lines (musical feel) -->
  <path d="M 30 310 Q 80 295 130 310 Q 180 325 230 310 Q 280 295 330 310 Q 370 320 395 310"
        fill="none" stroke="#B39DDB" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <path d="M 30 325 Q 80 310 130 325 Q 180 340 230 325 Q 280 310 330 325 Q 370 335 395 325"
        fill="none" stroke="#B39DDB" stroke-width="0.8" opacity="0.08" stroke-linecap="round"/>

  <!-- Text overlay -->
  <text x="200" y="222" font-family="Georgia,serif" font-size="13" font-weight="300"
        fill="rgba(248,244,255,0.45)" text-anchor="middle" letter-spacing="3">OUR SONGS</text>
  <text x="200" y="248" font-family="Georgia,serif" font-size="22" font-style="italic" font-weight="300"
        fill="rgba(248,244,255,0.78)" text-anchor="middle">Our Story</text>
  <text x="200" y="270" font-family="Georgia,serif" font-size="13"
        fill="rgba(179,157,219,0.55)" text-anchor="middle" letter-spacing="1">Rahul &amp; Raksitha</text>

  <!-- Subtle vignette -->
  <radialGradient id="vign" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(5,3,15,0.45)"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#vign)"/>
</svg>
