<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0A1E">
  <title>Birthday Wishes 🎂</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loadingScreen">
  <div class="loading-content">
    <span class="loading-moon">🎂</span>
    <p class="loading-text">opening the wishes wall...</p>
  </div>
</div>
<div id="transitionOverlay"></div>

<div class="universe-bg"></div>
<canvas id="starsCanvas"></canvas>
<div class="hearts-container"></div>
<div class="particles-container"></div>
<div class="clouds-container"></div>
<div class="moon"><div class="moon-halo"></div><div class="moon-sphere"></div></div>

<div class="page-wrapper" style="position:relative;z-index:10;min-height:100vh;">
  <div class="wish-page-wrap">
    <div class="wish-card-inner glass-card">

      <!-- Header -->
      <div class="wish-header">
        <span class="header-emoji">🎂</span>
        <p class="pre-text">
          This place belongs to our memories
          <span style="font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif"> 💜</span><br>
          But you can still leave a birthday wish for Raksitha
        </p>
        <h2 class="font-display">Leave Your Wish</h2>
      </div>

      <!-- Form -->
      <div id="wishFormWrap">
        <div class="fg">
          <label>Your Name</label>
          <input type="text" id="wishName" class="input-field" placeholder="How should we remember you?" autocomplete="off" maxlength="50">
        </div>

        <div class="fg">
          <label>Your Birthday Wish</label>
          <textarea id="wishText" class="input-field" placeholder="Write something beautiful for Raksitha..." maxlength="300"></textarea>
          <div class="char-count"><span id="charCount">0</span> / 300</div>
        </div>

        <div class="fg">
          <label>A Photo <span class="optional-tag">optional</span></label>
          <div class="upload-wrapper" id="uploadArea">
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(this)">
            <span class="upload-icon">📸</span>
            <p class="upload-label" id="uploadLabel">Tap to add a photo</p>
          </div>
        </div>

        <button class="btn-primary" onclick="submitWish()" id="submitBtn">
          Send Wishes &nbsp;<span style="font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif">❤️</span>
        </button>
      </div>

      <!-- Success -->
      <div class="success-wrap" id="successWrap">
        <span class="success-icon-big">💜</span>
        <h3 class="font-display" style="font-size:clamp(1.3rem,3vw,1.8rem);color:var(--moon-white);margin-bottom:0.6rem;">Wish Sent!</h3>
        <p style="font-weight:200;font-size:0.88rem;color:var(--text-secondary);line-height:1.7;">
          Raksitha will feel your love.<br>
          Thank you for being part of her day
          <span style="font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif"> 🌙</span>
        </p>
        <button class="btn-ghost" style="margin-top:1.5rem;" onclick="resetForm()">
          Send Another Wish
          <span style="font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif"> ✨</span>
        </button>
      </div>



    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/universe.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Pre-fill name
    const saved = sessionStorage.getItem('visitorName');
    if (saved) document.getElementById('wishName').value = saved;

    // Char counter
    document.getElementById('wishText').addEventListener('input', function () {
      document.getElementById('charCount').textContent = this.value.length;
    });
  });

  function handlePhotoSelect(input) {
    if (input.files && input.files[0]) {
      document.getElementById('uploadLabel').textContent = input.files[0].name;
      document.getElementById('uploadArea').style.borderColor = 'rgba(124,92,191,0.7)';
    }
  }

  async function submitWish() {
    const name = document.getElementById('wishName').value.trim();
    const message = document.getElementById('wishText').value.trim();

    if (!name) {
      document.getElementById('wishName').style.borderColor = 'rgba(232,160,191,0.5)';
      document.getElementById('wishName').focus();
      return;
    }
    if (!message) {
      document.getElementById('wishText').style.borderColor = 'rgba(232,160,191,0.5)';
      document.getElementById('wishText').focus();
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Sending...';
    btn.disabled = true;
    btn.style.opacity = '0.7';

    // Get optional uploaded file
    const photoInput = document.getElementById('photoInput');
    const photoFile = photoInput && photoInput.files ? photoInput.files[0] : null;

    try {
      await saveWishLocal(name, message, photoFile);
    } catch (err) {
      // Alert visitor with the validation errors or connection failures
      alert(err.message);
      btn.textContent = 'Send Wishes ❤️';
      btn.disabled = false;
      btn.style.opacity = '';
      return;
    }

    document.getElementById('wishFormWrap').style.display = 'none';
    document.getElementById('successWrap').classList.add('active');
  }

  function resetForm() {
    document.getElementById('wishFormWrap').style.display = 'block';
    document.getElementById('successWrap').classList.remove('active');
    document.getElementById('wishName').value = '';
    document.getElementById('wishText').value = '';
    document.getElementById('charCount').textContent = '0';
    document.getElementById('uploadLabel').textContent = 'Tap to add a photo';
    document.getElementById('uploadArea').style.borderColor = '';
    document.getElementById('submitBtn').textContent = 'Send Wishes ❤️';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').style.opacity = '';
    
    // Clear the selected file input
    const photoInput = document.getElementById('photoInput');
    if (photoInput) photoInput.value = '';
  }



  function escHtml(s) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s || '')));
    return d.innerHTML;
  }
</script>
</body>
</html>
